object_types:
  module:
    kind: fact
    description: Top-level feature directory under src/.
    required_attributes:
      - paths
  command:
    kind: fact
    description: CLI command declared via commander's program.command(...).
    required_attributes:
      - command
  use_case:
    kind: fact
    description: Application use case factory (`make<Name>`) under src/**/use-cases/.
    required_attributes:
      - factory

relationship_types: {}
